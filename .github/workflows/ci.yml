name: CI

on:
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar o Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Rodar os testes
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Instalar o Node
      uses: actions/setup-node@v4
      with:
          node-version: 22

    - name: Instalar dependências
      run: npm install

    - name: Rodar build
      run: npm run build